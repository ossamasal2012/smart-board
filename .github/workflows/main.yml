name: Build Infinite Whiteboard APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java Setup
        uses: actions/setup-java@v4
        with:
          java-version: '21' # تم التحديث من 17 إلى 21 لحل المشكلة الأخيرة
          distribution: 'temurin'

      - name: Node Setup
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create project files
        run: |
          mkdir -p src
          cp *.html src/index.html || echo "No html found"
          
          cat > package.json << 'EOF'
          {
            "name": "infinite.whiteboard.ossama",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/android": "latest",
              "@capacitor/core": "latest",
              "@capacitor/filesystem": "latest",
              "@capacitor/share": "latest"
            },
            "devDependencies": {
              "@capacitor/cli": "latest"
            }
          }
          EOF
          
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.ossama.whiteboard",
            "appName": "السبورة الذكية",
            "webDir": "src",
            "android": { "backgroundColor": "#000000" }
          }
          EOF

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Initialize Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Add Permissions
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Whiteboard-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
