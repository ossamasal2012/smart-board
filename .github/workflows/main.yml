name: Build Infinite Whiteboard APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create project files
        run: |
          mkdir -p src
          # نسخ ملف الـ HTML الخاص بك ليصبح index.html داخل مجلد العمل
          cp index.html src/index.html || echo "Warning: No HTML file found!"
          
          # إنشاء package.json مع أحدث إصدارات Capacitor لضمان التوافق
          cat > package.json << 'EOF'
          {
            "name": "infinite.whiteboard.ossama",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/android": "latest",
              "@capacitor/core": "latest",
              "@capacitor/filesystem": "latest",
              "@capacitor/share": "latest"
            },
            "devDependencies": {
              "@capacitor/cli": "latest"
            }
          }
          EOF

          # إعدادات التطبيق (الاسم والهوية واللون الخلفي)
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.ossama.whiteboard",
            "appName": "السبورة الذكية",
            "webDir": "src",
            "android": {
              "backgroundColor": "#000000"
            }
          }
          EOF

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Initialize Capacitor Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Add Android Permissions
        run: |
          # إضافة أذونات التخزين لملف AndroidManifest لضمان قدرة التطبيق على حفظ الصور
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml

      - name: Set App Icon
        run: |
          mkdir -p assets
          # أيقونة افتراضية، يمكنك تغيير الرابط لاحقاً لأيقونتك الخاصة
          curl -L "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQtqcg6zsweD4gOxtyqyKZ5SKHzlNr4NZu8_A&s" -o assets/icon.png
          npm install -g @capacitor/assets
          npx capacitor-assets generate --android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Whiteboard-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
